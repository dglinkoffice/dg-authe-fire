<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Background Updates</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Sync Sheet Notifications</h2>
        <p>Click below to receive alerts even when the web app is closed.</p>
        <button id="btn-allow" style="padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #4285F4; color: white; border: none; border-radius: 4px;">
            Enable Background Push
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        // Your exact Firebase configuration
        const firebaseConfig = {
            authDomain: "dgleave-16d4d.firebaseapp.com",
            projectId: "dgleave-16d4d",
            messagingSenderId: "117425769458776465790" // Extracted from client ID
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        document.getElementById('btn-allow').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                try {
                    // Pre-filled with your explicit VAPID key
                    const token = await getToken(messaging, { 
                        vapidKey: 'BOyiiikuIeSLoHUZOsbMIUXkpZjFPiEZQliGwJZbXiqdAW0PX-bslZaj8Hp_17yXq3FV21BvXxVQMKFGYZfiaLo' 
                    });
                    
                    if (token) {
                        // REPLACE THIS WITH YOUR DEPLOYED APPS SCRIPT WEB APP URL
                        const appsScriptUrl = "YOUR_APPS_SCRIPT_WEB_APP_EXEC_URL";
                        
                        fetch(`${appsScriptUrl}?token=${token}`, { mode: 'no-cors' });
                        alert("Registered successfully! You can safely close this browser window.");
                    }
                } catch (err) {
                    console.error("Token registration error:", err);
                    alert("Error fetching device token. Check console logs.");
                }
            } else {
                alert("Please click allow to receive notifications when closed.");
            }
        });
    </script>
</body>
</html>
